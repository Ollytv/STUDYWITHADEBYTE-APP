name = "studibyte"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# Create with: wrangler kv namespace create RATE_LIMIT_KV
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "194e0a8aede247dea3be835085780ead"

# Non-secret config. Secrets (GEMINI_API_KEY, GROQ_API_KEY, DEEPSEEK_API_KEY,
# OPENROUTER_API_KEY) are NOT set here — use:
#   wrangler pages secret put GEMINI_API_KEY
#   wrangler pages secret put GROQ_API_KEY
#   wrangler pages secret put DEEPSEEK_API_KEY
#   wrangler pages secret put OPENROUTER_API_KEY
[vars]
GEMINI_MODEL = "gemini-2.0-flash"
GROQ_MODEL = "llama-3.3-70b-versatile"
DEEPSEEK_MODEL = "deepseek-chat"
OPENROUTER_MODEL = "openai/gpt-4o-mini"
VITE_FIREBASE_PROJECT_ID = "studywithadebyte"
AI_RATE_LIMIT_PER_MINUTE = "15"
